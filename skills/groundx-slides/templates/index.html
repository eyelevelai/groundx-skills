<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GroundX Deck — Slide Index</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body { background: var(--gx-aqua); padding: 48px; }
      .index-title {
        font-family: var(--gx-font);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--gx-navy);
        margin: 0 0 32px 0;
      }
      .thumbs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(760px, 1fr));
        gap: 32px;
      }
      .thumb {
        display: block;
        border-radius: var(--gx-radius-card);
        overflow: hidden;
        border: var(--gx-border-hairline);
        background: var(--gx-white);
        text-decoration: none;
        color: inherit;
      }
      .thumb iframe {
        width: var(--gx-slide-width);
        height: var(--gx-slide-height);
        border: 0;
        transform: scale(0.4);
        transform-origin: top left;
      }
      .thumb__frame {
        width: 768px;
        height: 432px;
        overflow: hidden;
      }
      .thumb__label {
        font-family: var(--gx-font);
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--gx-navy);
        padding: 16px 24px;
        border-top: var(--gx-border-hairline);
      }
    </style>
  </head>
  <body>
    <h1 class="index-title">GroundX Deck — Slide Index</h1>
    <div class="thumbs" id="thumbs"></div>
    <script>
      // Pull the slide list from the server's directory listing; fall back to a hardcoded list.
      async function loadSlides() {
        const fallback = [
          "01-cover.html",
          "02-hero-with-stats.html",
          "03-split-problem-solution.html",
          "04-three-card-grid.html",
          "05-numbered-steps.html",
          "06-display-stat.html",
          "07-cta.html",
        ];
        const container = document.getElementById("thumbs");
        for (const file of fallback) {
          const a = document.createElement("a");
          a.className = "thumb";
          a.href = "/slides/" + file;
          const frame = document.createElement("div");
          frame.className = "thumb__frame";
          const iframe = document.createElement("iframe");
          iframe.src = "/slides/" + file;
          frame.appendChild(iframe);
          const label = document.createElement("div");
          label.className = "thumb__label";
          label.textContent = file;
          a.appendChild(frame);
          a.appendChild(label);
          container.appendChild(a);
        }
      }
      loadSlides();
    </script>
  </body>
</html>
