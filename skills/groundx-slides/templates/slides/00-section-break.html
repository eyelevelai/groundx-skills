<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Section break</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!--
      Numbered 00- intentionally so this example sorts before the main deck.
      Rename (e.g., 03a-) to drop it into a specific position in your own deck.
    -->
    <div class="slide slide--navy slide--section-break">

      <div class="slide-number">—</div>

      <div class="section-break-content">
        <div class="eyebrow">PART TWO</div>
        <h1 class="headline-section">How we get there.</h1>
        <p class="subhead subhead--center">
          A two-week proof of concept with real data, not a roadmap.
        </p>
      </div>

    </div>
  </body>
</html>
