<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cover</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="slide slide--navy slide--cover">

      <div class="slide-logo" role="img" aria-label="EyeLevel, a Valantor company"></div>
      <div class="slide-number">01</div>
      <div class="accent-bar accent-bar--bottom"></div>

      <div class="cover-context">WHITE PAPER · YOUR CONTEXT HERE</div>

      <div class="cover-main">
        <h1 class="headline-cover">Your deck title here</h1>
        <p class="subhead">
          A one- or two-sentence subhead that clarifies what this deck is about and who it's for.
        </p>
      </div>

      <div class="cover-stats">
        <div class="stat-row stat-row--cycle">
          <div class="stat">
            <div class="stat-numeral">99%</div>
            <div class="stat-label">ACCURACY</div>
          </div>
          <div class="stat">
            <div class="stat-numeral">500B</div>
            <div class="stat-label">PARAMETERS</div>
          </div>
          <div class="stat">
            <div class="stat-numeral">3×</div>
            <div class="stat-label">FASTER</div>
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
