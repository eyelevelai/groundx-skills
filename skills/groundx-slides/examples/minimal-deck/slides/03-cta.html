<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CTA — Minimal Deck</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="slide slide--navy slide--cta">
      <div class="slide-logo">
        <img src="/assets/logos/groundx-ai-log.png" alt="GroundX" />
        <span class="tagline">A VALANTOR COMPANY</span>
      </div>
      <div class="slide-number">03</div>
      <div class="accent-bar accent-bar--top"></div>

      <div style="position: absolute; left: 80px; right: 80px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 32px; max-width: 1500px;">
        <div class="eyebrow">NEXT</div>
        <h1 class="headline-cover" style="font-size: clamp(3.5rem, 6vw, 6rem);">One working session.</h1>
        <p class="body" style="color: rgba(255,255,255,0.8); max-width: 1100px;">
          Bring ten of your hardest queries. We'll run them through GroundX
          against your own corpus and share the retrieval traces line-by-line.
        </p>
        <div style="display: flex; gap: 16px; margin-top: 24px;">
          <a class="cta" href="#">BOOK THE SESSION</a>
        </div>
      </div>
    </div>
  </body>
</html>
