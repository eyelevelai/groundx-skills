# Verify the skills' brand and structural contracts on every push and PR.
#
# Two checks run in sequence:
#   1. Mirror drift — if someone edits tokens.json without re-running the
#      generator (or hand-edits a generated file), verify-mirrors.mjs fails.
#   2. Structural lint — codifies every brand-contract assertion the skills
#      enforce: no hex literals in components, no raw fontSize on icons, no
#      @media strings, every IconButton has aria-label, every relative import
#      resolves, every required file exists, voice-avoid words don't leak,
#      etc. See scripts/lint-skills.mjs.
#
# Both scripts are pure Node with zero npm deps, so we skip `npm install`.
name: Verify skills

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-skills:
    name: tokens drift + structural lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate tokens.json is parseable
        run: >-
          node --input-type=module -e
          "import('./skills/eyelevel-design-standards/tokens.json', { with: {
          type: 'json' } }).then(() => console.log('tokens.json parses
          cleanly.'))"

      - name: Verify mirrors are in sync with tokens.json
        working-directory: skills/eyelevel-design-standards
        run: node scripts/verify-mirrors.mjs

      - name: Run structural lint across all skills
        run: node scripts/lint-skills.mjs
