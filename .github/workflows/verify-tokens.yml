# Verify that every mirror generated from groundx-design-standards/tokens.json is
# in sync with the source of truth. If someone edits tokens.json without re-running
# the generator (or hand-edits a generated file), this job fails loudly.
#
# The verify script is pure Node with zero npm deps, so we skip `npm install`.
# See skills/groundx-design-standards/scripts/verify-mirrors.mjs.
name: Verify token mirrors

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-mirrors:
    name: tokens.json → mirrors drift check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate tokens.json is parseable
        run: >-
          node --input-type=module -e
          "import('./skills/groundx-design-standards/tokens.json', { with: {
          type: 'json' } }).then(() => console.log('tokens.json parses
          cleanly.'))"

      - name: Verify mirrors are in sync with tokens.json
        working-directory: skills/groundx-design-standards
        run: node scripts/verify-mirrors.mjs
